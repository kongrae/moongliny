<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#FFF7F0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="우리의 1주년" />
<meta name="mobile-web-app-capable" content="yes" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png" />
<title>우리의 1주년</title>
<style>
:root {
  --cream:#fff7f0;
  --ivory:#f8f1e7;
  --paper:rgba(255,255,255,.6);
  --ink:#2f2422;
  --deep:#211916;
  --muted:#6f554d;
  --coral:#f4a7a3;
  --apricot:#f4c8a2;
  --rose:#b76e79;
  --brown:#c98f70;
  --aura:linear-gradient(120deg,#7b4e45 0%,#b76e79 34%,#d89a78 68%,#8f6f62 100%);
  --line:rgba(112,78,67,.16);
  --shadow:0 22px 60px rgba(126,78,63,.14);
  --soft:0 12px 32px rgba(126,78,63,.1);
}
* { box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  margin:0;
  color:#3a2a28;
  font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  font-size:17px;
  background:
    radial-gradient(circle at 10% 8%,rgba(244,167,163,.42),transparent 25%),
    radial-gradient(circle at 88% 6%,rgba(244,200,162,.42),transparent 26%),
    radial-gradient(circle at 78% 72%,rgba(183,110,121,.18),transparent 32%),
    linear-gradient(145deg,var(--cream),var(--ivory));
  min-height:100svh;
}
body.modal-locked {
  width:100%;
}
html.modal-locked-root,
html.modal-locked-root body {
  overscroll-behavior:none;
  background:#5a4b4c !important;
}
body::before {
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:.38;
  background-image:
    radial-gradient(circle,rgba(61,44,46,.07) 0 1px,transparent 1.4px),
    linear-gradient(90deg,rgba(255,255,255,.22),rgba(255,255,255,0));
  background-size:24px 24px,100% 100%;
  mix-blend-mode:multiply;
}
body::after {
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  pointer-events:none;
  background:
    linear-gradient(120deg,rgba(255,255,255,.7),rgba(255,255,255,0) 34%,rgba(255,255,255,.42) 72%,rgba(255,255,255,0)),
    radial-gradient(ellipse at 22% 28%,rgba(255,255,255,.72),rgba(255,255,255,0) 28%),
    radial-gradient(ellipse at 72% 38%,rgba(255,255,255,.52),rgba(255,255,255,0) 26%);
  filter:blur(.2px);
}
button,a { font:inherit; }
button { cursor:pointer; }
#root { position:relative; }
.app {
  position:relative;
  z-index:1;
  width:min(1180px,100%);
  margin:0 auto;
  padding:calc(12px + env(safe-area-inset-top)) 18px 18px;
}
.nav {
  position:sticky;
  top:calc(12px + env(safe-area-inset-top));
  z-index:5;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  width:min(980px,100%);
  margin:0 auto 8px;
  padding:10px 14px;
  border:1px solid rgba(255,255,255,.7);
  border-radius:999px;
  background:linear-gradient(135deg,rgba(255,255,255,.42),rgba(255,247,240,.18));
  backdrop-filter:blur(30px) saturate(1.45);
  box-shadow:0 18px 48px rgba(126,78,63,.13), inset 0 1px 0 rgba(255,255,255,.78);
}
.brand {
  display:flex;
  align-items:center;
  gap:8px;
  min-width:0;
  font-weight:900;
  color:var(--rose);
}
.brand-text {
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.brand-mark {
  flex:0 0 auto;
  width:26px;
  height:26px;
  border-radius:50%;
  display:grid;
  place-items:center;
  color:#fff;
  background:linear-gradient(135deg,var(--coral),var(--rose));
}
.nav-links {
  display:flex;
  gap:18px;
  font-size:14px;
  font-weight:900;
}
.nav-links a {
  color:var(--muted);
  text-decoration:none;
}
.section {
  width:min(980px,100%);
  margin:0 auto;
  padding:44px 0;
}
.intro {
  min-height:calc(100svh - 112px);
  display:grid;
  align-items:center;
  grid-template-columns:1fr;
  gap:14px;
  padding-top:20px;
}
.hero-card {
  position:relative;
  overflow:hidden;
  display:grid;
  grid-template-columns:1.02fr .98fr;
  gap:26px;
  align-items:center;
  padding:28px;
  border:1px solid rgba(255,255,255,.72);
  border-radius:34px;
  background:linear-gradient(145deg,rgba(255,255,255,.62),rgba(255,247,240,.32));
  backdrop-filter:blur(26px) saturate(1.22);
  box-shadow:0 28px 80px rgba(126,78,63,.16), inset 0 1px 0 rgba(255,255,255,.8);
}
.heart-rain {
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  overflow:hidden;
}
.heart-rain span {
  position:absolute;
  top:-40px;
  left:var(--x);
  color:rgba(183,110,121,.32);
  font-size:var(--s);
  animation:heartFall var(--d) linear infinite;
  animation-delay:var(--delay);
  filter:blur(.1px);
}
@keyframes heartFall {
  0% { transform:translate3d(0,-32px,0) rotate(0deg); opacity:0; }
  12% { opacity:.76; }
  100% { transform:translate3d(var(--drift),112vh,0) rotate(28deg); opacity:0; }
}
.hero-card::before {
  content:"";
  position:absolute;
  inset:16px;
  pointer-events:none;
  border:1px dashed rgba(183,110,121,.18);
  border-radius:26px;
}
.kicker {
  display:inline-flex;
  align-items:center;
  gap:8px;
  margin-bottom:16px;
  color:var(--rose);
  font-size:13px;
  font-weight:900;
}
.title {
  margin:0;
  color:transparent;
  background:var(--aura);
  -webkit-background-clip:text;
  background-clip:text;
  font-family:ui-rounded,"SF Pro Rounded","Segoe UI",system-ui,sans-serif;
  font-weight:950;
  font-size:clamp(46px,9vw,94px);
  line-height:1.02;
  letter-spacing:0;
  text-shadow:0 12px 34px rgba(183,110,121,.14);
}
.subtitle {
  margin:20px 0 0;
  color:var(--muted);
  line-height:1.75;
  font-size:17px;
}
.actions {
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:24px;
}
.primary-btn,
.ghost-btn {
  min-height:48px;
  border-radius:999px;
  border:0;
  padding:0 18px;
  font-weight:900;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  justify-content:center;
}
.primary-btn {
  color:#fff;
  background:linear-gradient(135deg,var(--coral),var(--rose));
  box-shadow:0 14px 32px rgba(183,110,121,.25);
}
.ghost-btn {
  color:var(--rose);
  background:rgba(255,255,255,.74);
  border:1px solid rgba(183,110,121,.18);
}
.hero-photo-wrap {
  position:relative;
  min-height:470px;
  display:grid;
  place-items:center;
}
.film-frame {
  width:min(410px,82vw);
  transform:rotate(2deg);
  padding:16px 16px 54px;
  border-radius:8px;
  background:#fff;
  box-shadow:0 22px 54px rgba(69,43,36,.2);
}
.film-frame::after {
  content:"2025.05.27  Our first year";
  display:block;
  margin-top:12px;
  color:#8b7066;
  font-family:ui-rounded,"SF Pro Rounded","Segoe UI",system-ui,sans-serif;
  font-weight:800;
  font-size:17px;
}
.hero-photo {
  position:relative;
  aspect-ratio:4/5;
  border-radius:6px;
  overflow:hidden;
  background:url("assets/main-hero-cropped.jpg") center 45%/cover no-repeat;
}
.hero-photo::after,
.photo-surface::after,
.modal-photo::after {
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  opacity:.18;
  background-image:
    radial-gradient(circle,rgba(255,255,255,.75) 0 1px,transparent 1.2px),
    linear-gradient(90deg,rgba(61,44,46,.12),transparent 12%,rgba(255,255,255,.12) 50%,transparent 88%);
  background-size:18px 18px,100% 100%;
  mix-blend-mode:soft-light;
}
.tape {
  position:absolute;
  width:96px;
  height:32px;
  border-radius:6px;
  background:rgba(244,200,162,.7);
  box-shadow:0 8px 16px rgba(126,78,63,.1);
}
.tape.one { top:32px; left:28px; transform:rotate(-12deg); }
.tape.two { right:30px; bottom:62px; transform:rotate(13deg); }
.sticker {
  position:absolute;
  color:var(--rose);
  font-weight:900;
  text-shadow:0 8px 20px rgba(183,110,121,.18);
}
.sticker.heart-a { left:8%; bottom:16%; font-size:42px; transform:rotate(-12deg); }
.sticker.heart-b { right:10%; top:12%; font-size:26px; transform:rotate(15deg); }
.section-heading {
  display:flex;
  justify-content:space-between;
  align-items:end;
  gap:18px;
  margin-bottom:18px;
}
.section-heading h2 {
  margin:0;
  color:transparent;
  background:var(--aura);
  -webkit-background-clip:text;
  background-clip:text;
  font-size:clamp(28px,5vw,48px);
  line-height:1.05;
}
.section-heading p {
  margin:0;
  max-width:420px;
  color:var(--muted);
  font-size:17px;
  line-height:1.65;
}
.bento {
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:14px;
}
.bento-card,
.paper-card {
  border:1px solid rgba(255,255,255,.74);
  border-radius:26px;
  background:linear-gradient(145deg,rgba(255,255,255,.42),rgba(255,247,240,.18));
  backdrop-filter:blur(30px) saturate(1.45);
  box-shadow:0 18px 52px rgba(126,78,63,.12), inset 0 1px 0 rgba(255,255,255,.72);
}
.bento-card {
  min-height:172px;
  padding:22px;
}
.bento-card.large,
.bento-card.medium,
.bento-card.small { grid-column:auto; }
.bento-label {
  display:block;
  margin-bottom:12px;
  color:var(--rose);
  font-size:14px;
  font-weight:900;
}
.bento-value {
  margin:0;
  color:transparent;
  background:var(--aura);
  -webkit-background-clip:text;
  background-clip:text;
  font-size:clamp(28px,5vw,58px);
  line-height:1;
}
.bento-text {
  margin:0;
  color:var(--muted);
  font-size:17px;
  line-height:1.7;
}
.stamp {
  display:inline-flex;
  margin-top:18px;
  padding:7px 11px;
  border:1px solid rgba(183,110,121,.32);
  border-radius:999px;
  color:var(--rose);
  font-weight:900;
  font-size:13px;
}
.album-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
}
.polaroid {
  display:block;
  width:100%;
  border:1px solid rgba(255,255,255,.74);
  text-align:left;
  padding:14px;
  border-radius:26px;
  background:
    linear-gradient(145deg,rgba(255,255,255,.48),rgba(255,247,240,.22));
  backdrop-filter:blur(30px) saturate(1.45);
  box-shadow:0 18px 52px rgba(126,78,63,.12), inset 0 1px 0 rgba(255,255,255,.72);
  cursor:pointer;
  transition:transform .22s ease, box-shadow .22s ease, border-color .22s ease, background .22s ease;
}
.polaroid:focus-visible {
  outline:3px solid rgba(183,110,121,.38);
  outline-offset:4px;
}
.polaroid:hover {
  transform:translateY(-4px) scale(1.015) rotate(var(--tilt));
  border-color:rgba(255,255,255,.9);
  background:linear-gradient(145deg,rgba(255,255,255,.62),rgba(255,247,240,.3));
  box-shadow:0 24px 68px rgba(77,48,38,.18), inset 0 1px 0 rgba(255,255,255,.82);
}
.photo-surface {
  position:relative;
  overflow:hidden;
  aspect-ratio:4/3;
  border:1px solid rgba(255,255,255,.58);
  border-radius:18px;
  background:linear-gradient(145deg,rgba(255,250,247,.72),rgba(234,217,205,.58));
  box-shadow:inset 0 1px 0 rgba(255,255,255,.62);
}
.photo-surface img,
.photo-surface video {
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.polaroid-meta {
  padding:14px 4px 2px;
}
.polaroid-meta time {
  color:var(--rose);
  font-size:13px;
  font-weight:900;
}
.polaroid-meta h3 {
  margin:6px 0 5px;
  color:var(--deep);
  font-size:21px;
}
.polaroid-meta p {
  margin:0;
  color:var(--muted);
  line-height:1.55;
  font-size:15px;
}
.timeline {
  position:relative;
  display:grid;
  gap:16px;
  margin-left:10px;
  padding-left:24px;
}
.timeline::before {
  content:"";
  position:absolute;
  left:7px;
  top:8px;
  bottom:8px;
  width:2px;
  background:linear-gradient(var(--coral),var(--brown));
}
.timeline-item {
  position:relative;
  padding:18px;
  border-radius:22px;
  background:rgba(255,255,255,.7);
  border:1px solid rgba(255,255,255,.78);
  box-shadow:var(--soft);
}
.timeline-item::before {
  content:"♥";
  position:absolute;
  left:-30px;
  top:18px;
  width:26px;
  height:26px;
  display:grid;
  place-items:center;
  border-radius:50%;
  color:#fff;
  background:var(--coral);
  font-size:12px;
}
.timeline-item time {
  color:var(--rose);
  font-weight:900;
  font-size:14px;
}
.timeline-item h3 {
  margin:8px 0 5px;
  color:var(--deep);
}
.timeline-item p {
  margin:0;
  color:var(--muted);
  font-size:16px;
  line-height:1.6;
}
.letter-wrap {
  display:grid;
  grid-template-columns:.82fr 1.18fr;
  gap:18px;
  align-items:stretch;
}
.letter-photo {
  min-height:420px;
  border-radius:26px;
  background:url("assets/main-hero-cropped.jpg") center 45%/cover no-repeat;
  box-shadow:var(--soft);
}
.letter-card {
  padding:34px;
  border-radius:26px;
  background:
    linear-gradient(90deg,rgba(201,143,112,.12) 1px,transparent 1px) 0 0/28px 100%,
    rgba(255,255,255,.76);
  border:1px solid rgba(255,255,255,.78);
  box-shadow:var(--soft);
}
.hand-title {
  margin:0 0 20px;
  color:var(--rose);
  font-family:ui-rounded,"SF Pro Rounded","Segoe UI",system-ui,sans-serif;
  font-weight:950;
  font-size:clamp(28px,5vw,44px);
  line-height:1.15;
}
.letter-card p {
  margin:0 0 16px;
  color:var(--deep);
  line-height:1.9;
  font-size:17px;
}
.signature {
  margin-top:8px;
  color:var(--brown);
  font-weight:900;
  text-align:right;
}
.current-wrap {
  display:grid;
  grid-template-columns:.82fr 1.18fr;
  gap:18px;
}
.memory-connector {
  width:min(980px,100%);
  margin:-4px auto -4px;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  gap:7px;
  color:rgba(183,110,121,.78);
  font-size:38px;
  line-height:.42;
  text-shadow:0 10px 24px rgba(183,110,121,.2);
}
.memory-connector::before,
.memory-connector::after {
  content:"";
  width:1px;
  height:44px;
  background:linear-gradient(180deg,transparent,rgba(183,110,121,.4),transparent);
}
.current-photo {
  min-height:300px;
  border:2px dashed rgba(183,110,121,.32);
  display:grid;
  place-items:center;
  color:var(--rose);
  font-weight:900;
}
.final-card {
  text-align:center;
  padding:44px 22px;
}
.modal {
  position:fixed;
  left:0;
  right:0;
  top:0;
  height:100lvh;
  z-index:20;
  display:none;
  place-items:center;
  padding:calc(22px + env(safe-area-inset-top)) 22px calc(22px + env(safe-area-inset-bottom));
  min-height:100vh;
  min-height:100dvh;
  min-height:100lvh;
  isolation:isolate;
  background:transparent;
  backdrop-filter:none;
  overflow:hidden;
}
.modal.open { display:grid; }
.modal.open .modal-shell {
  animation:modalIn .72s cubic-bezier(.16,1,.3,1) both;
}
.modal.closing .modal-shell {
  animation:modalOut .46s cubic-bezier(.7,0,.84,0) both;
}
.modal.open::before {
  animation:veilIn .58s ease both;
}
.modal.closing::before {
  animation:veilOut .42s ease both;
}
@keyframes modalIn {
  from { opacity:0; transform:translateY(8px) scale(.68); filter:blur(28px); }
  62% { opacity:1; transform:translateY(8px) scale(1.04); filter:blur(3px); }
  to { opacity:1; transform:translateY(8px) scale(1); filter:blur(0); }
}
@keyframes modalOut {
  from { opacity:1; transform:translateY(8px) scale(1); filter:blur(0); }
  to { opacity:0; transform:translateY(8px) scale(.72); filter:blur(24px); }
}
@keyframes veilIn {
  from { opacity:0; }
  to { opacity:1; }
}
@keyframes veilOut {
  from { opacity:1; }
  to { opacity:0; }
}
.modal::before {
  content:"";
  position:fixed;
  left:0;
  right:0;
  top:-40lvh;
  height:220lvh;
  z-index:0;
  background:rgba(86,68,66,.34);
  backdrop-filter:blur(16px) saturate(1.16);
}
.modal-shell {
  position:relative;
  z-index:1;
  transform:translateY(8px);
  width:min(1060px,100%);
  max-height:calc(100svh - 24px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
  display:grid;
  gap:14px;
  justify-items:end;
}
.modal-card {
  width:100%;
  max-height:min(91svh,calc(100svh - 92px - env(safe-area-inset-top) - env(safe-area-inset-bottom)));
  display:flex;
  flex-direction:column;
  overflow:hidden;
  overflow-anchor:none;
  border-radius:28px;
  isolation:isolate;
  border:1px solid rgba(255,255,255,.76);
  background:linear-gradient(145deg,rgba(255,255,255,.62),rgba(255,247,240,.34));
  backdrop-filter:blur(40px) saturate(1.62);
  box-shadow:0 28px 90px rgba(61,44,46,.2), inset 0 1px 0 rgba(255,255,255,.82);
}
.modal-head {
  position:relative;
  flex:0 0 auto;
  min-height:78px;
  display:flex;
  align-items:center;
  margin:14px 14px 0;
  border-radius:22px;
  padding:20px 22px;
  border:1px solid rgba(255,255,255,.66);
  background:linear-gradient(145deg,rgba(255,250,247,.68),rgba(255,246,239,.38));
  backdrop-filter:blur(34px) saturate(1.52);
  box-shadow:0 12px 28px rgba(61,44,46,.06), inset 0 1px 0 rgba(255,255,255,.72);
}
.modal-head h3 {
  margin:0;
  color:transparent;
  background:var(--aura);
  -webkit-background-clip:text;
  background-clip:text;
  font-size:clamp(27px,4.4vw,42px);
  line-height:1.18;
  text-shadow:0 1px 0 rgba(255,255,255,.42);
}
.modal-grid {
  flex:1 1 auto;
  min-height:0;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  grid-auto-rows:max-content;
  align-content:start;
  align-items:start;
  gap:16px;
  padding:20px;
  overflow:auto;
  overscroll-behavior:contain;
  border-radius:0 0 28px 28px;
  background:linear-gradient(180deg,rgba(255,247,240,.2),rgba(255,247,240,.08));
  font-size:18px;
}
.modal-photo {
  position:relative;
  overflow:hidden;
  min-height:0;
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    linear-gradient(145deg,rgba(255,250,247,.62),rgba(234,217,205,.38));
}
.modal-memory {
  margin:0;
  display:grid;
  gap:9px;
}
.modal-caption {
  margin:0;
  padding:10px 12px;
  border:1px solid rgba(255,255,255,.58);
  border-radius:15px;
  color:#5f4740;
  background:linear-gradient(145deg,rgba(255,255,255,.58),rgba(255,247,240,.28));
  backdrop-filter:blur(24px) saturate(1.35);
  box-shadow:0 10px 24px rgba(61,44,46,.08), inset 0 1px 0 rgba(255,255,255,.66);
  font-size:16px;
  font-weight:750;
  line-height:1.55;
}
.modal-photo img,
.modal-photo video {
  width:auto;
  max-width:100%;
  height:auto;

function MemoryModal({ memory, closing, onClose }) {
  React.useEffect(() => {
    if (!memory) return undefined;

    function handleKey(event) {
      if (event.key === "Escape") onClose();
    }

    function lockBackgroundTouch(event) {
      if (event.target?.closest?.(".modal-grid")) return;
      event.preventDefault();
    }

    document.documentElement.classList.add("modal-locked-root");
    document.body.classList.add("modal-locked");
    window.addEventListener("keydown", handleKey);
    document.querySelector(".modal")?.addEventListener("touchmove", lockBackgroundTouch, { passive:false });
    window.requestAnimationFrame(() => {
      const grid = document.querySelector(".modal-grid");
      if (grid) grid.scrollTop = 0;
    });
    const playTimer = window.setTimeout(() => {
      document.querySelectorAll(".modal video").forEach(video => {
        if (!video.autoplay) return;
        video.muted = true;
        video.playsInline = true;
        video.play?.().catch(() => {});
      });
    }, 120);
    return () => {
      window.clearTimeout(playTimer);
      document.querySelectorAll(".modal video").forEach(video => video.pause?.());
      document.querySelector(".modal")?.removeEventListener("touchmove", lockBackgroundTouch);
      document.documentElement.classList.remove("modal-locked-root");
      document.body.classList.remove("modal-locked");
      window.removeEventListener("keydown", handleKey);
    };
  }, [memory, onClose]);

  if (!memory) return null;
  return (
    <div className={`modal open${closing ? " closing" : ""}`} onClick={event => event.target.classList.contains("modal") && onClose()} aria-hidden="false">
      <div className="modal-shell">
        <div className="modal-card">
          <div className="modal-head">
            <div>
              <h3>{memory.title}</h3>
            </div>
          </div>
          <div className="modal-grid">
            {memory.media.map((item, index) => (
              <figure className="modal-memory" key={`${item.src}-${index}`}>
                <div className="modal-photo">
                  <Media item={item} />
                </div>
                <figcaption className="modal-caption">{item.caption || item.alt || memory.memo}</figcaption>
              </figure>
            ))}
          </div>
        </div>
        <button className="modal-close-floating" type="button" onClick={onClose} aria-label="앨범 닫기">닫기</button>
      </div>
    </div>
  );
}
