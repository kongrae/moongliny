<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#FFF7F0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="뭉리니♥" />
<meta name="mobile-web-app-capable" content="yes" />
<link rel="manifest" href="manifest.webmanifest?v=72" />
<link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png?v=72" />
<link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png?v=72" />
<title>뭉리니♥</title>
<style>
:root {
  --cream:#fff7f0;
  --ivory:#f8f1e7;
  --paper:rgba(255,255,255,.6);
  --ink:#2f2422;
  --deep:#211916;
  --muted:#6f554d;
  --coral:#f4a7a3;
  --apricot:#f4c8a2;
  --rose:#b76e79;
  --brown:#c98f70;
  --aura:linear-gradient(120deg,#7b4e45 0%,#b76e79 34%,#d89a78 68%,#8f6f62 100%);
  --line:rgba(112,78,67,.16);
  --glass-bg:linear-gradient(145deg,rgba(255,255,255,.58),rgba(255,247,240,.28));
  --glass-border:rgba(255,255,255,.76);
  --glass-shadow:0 18px 52px rgba(126,78,63,.12), inset 0 1px 0 rgba(255,255,255,.74);
  --shadow:var(--glass-shadow);
  --soft:0 14px 34px rgba(126,78,63,.1), inset 0 1px 0 rgba(255,255,255,.64);
}
* { box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  margin:0;
  color:#3a2a28;
  font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  font-size:17px;
  background:
    radial-gradient(circle at 12% 10%,rgba(244,167,163,.38),transparent 25%),
    radial-gradient(circle at 88% 8%,rgba(244,200,162,.38),transparent 27%),
    radial-gradient(circle at 80% 74%,rgba(183,110,121,.16),transparent 34%),
    linear-gradient(115deg,rgba(255,255,255,.24) 0 12%,transparent 12% 28%,rgba(255,255,255,.18) 28% 42%,transparent 42% 100%),
    linear-gradient(145deg,var(--cream),var(--ivory));
  background-attachment:scroll;
  min-height:100svh;
}
body.modal-locked {
  width:100%;
}
html.modal-locked-root,
html.modal-locked-root body {
  overscroll-behavior:none;
  background-color:var(--cream);
}
body::before {
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:.52;
  background-image:
    radial-gradient(circle at 1px 1px,rgba(61,44,46,.07) 0 1px,transparent 1.8px),
    repeating-linear-gradient(135deg,rgba(183,110,121,.045) 0 1px,transparent 1px 18px),
    repeating-linear-gradient(45deg,rgba(201,143,112,.035) 0 1px,transparent 1px 22px);
  background-size:26px 26px,180px 180px,220px 220px;
  mix-blend-mode:multiply;
}
body::after {
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  pointer-events:none;
  background:
    linear-gradient(120deg,rgba(255,255,255,.68),rgba(255,255,255,0) 34%,rgba(255,255,255,.4) 72%,rgba(255,255,255,0)),
    radial-gradient(ellipse at 22% 28%,rgba(255,255,255,.68),rgba(255,255,255,0) 28%),
    radial-gradient(ellipse at 72% 38%,rgba(255,255,255,.5),rgba(255,255,255,0) 26%),
    linear-gradient(180deg,rgba(255,247,240,.2),rgba(248,241,231,.08));
  filter:blur(.2px);
}
button,a { font:inherit; }
button { cursor:pointer; }
#root { position:relative; }
.app {
  position:relative;
  z-index:1;
  width:min(1180px,100%);
  margin:0 auto;
  padding:calc(12px + env(safe-area-inset-top)) 18px 18px;
}
.nav {
  position:sticky;
  top:calc(12px + env(safe-area-inset-top));
  z-index:5;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  width:min(980px,100%);
  margin:0 auto 8px;
  padding:10px 14px;
  border:1px solid rgba(255,255,255,.7);
  border-radius:999px;
  background:linear-gradient(135deg,rgba(255,255,255,.62),rgba(255,247,240,.32));
  backdrop-filter:blur(18px) saturate(1.2);
  box-shadow:0 14px 38px rgba(126,78,63,.12), inset 0 1px 0 rgba(255,255,255,.82);
}
.brand {
  display:flex;
  align-items:center;
  gap:8px;
  min-width:0;
  font-weight:900;
  color:var(--rose);
}
.brand-text {
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.brand-mark {
  flex:0 0 auto;
  width:26px;
  height:26px;
  border-radius:50%;
  display:grid;
  place-items:center;
  color:#fff;
  background:linear-gradient(135deg,var(--coral),var(--rose));
}
.nav-links {
  display:flex;
  gap:18px;
  font-size:14px;
  font-weight:900;
}
.nav-links a {
  color:var(--muted);
  text-decoration:none;
}
.section {
  width:min(980px,100%);
  margin:0 auto 30px;
  padding:0;
}
.intro {
  min-height:auto;
  display:grid;
  align-items:center;
  grid-template-columns:1fr;
  gap:14px;
  padding-top:20px;
  margin-bottom:30px;
}
.hero-card {
  position:relative;
  overflow:hidden;
  display:grid;
  grid-template-columns:1.02fr .98fr;
  gap:26px;
  align-items:center;
  padding:28px;
  border:1px solid var(--glass-border);
  border-radius:34px;
  background:var(--glass-bg);
  backdrop-filter:blur(20px) saturate(1.18);
  box-shadow:var(--glass-shadow);
}
.heart-rain {
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  overflow:hidden;
  contain:strict;
}
.heart-rain span {
  position:absolute;
  top:-40px;
  left:var(--x);
  color:rgba(183,110,121,.2);
  font-size:var(--s);
  animation:heartFall var(--d) linear infinite;
  animation-delay:var(--delay);
  filter:blur(.1px);
}
.heart-rain span:nth-child(n+8) {
  display:none;
}
@keyframes heartFall {
  0% { transform:translate3d(0,-32px,0) rotate(0deg); opacity:0; }
  12% { opacity:.76; }
  100% { transform:translate3d(var(--drift),112vh,0) rotate(28deg); opacity:0; }
}
.hero-card::before {
  content:"";
  position:absolute;
  inset:16px;
  pointer-events:none;
  border:1px dashed rgba(183,110,121,.18);
  border-radius:26px;
}
.kicker {
  display:inline-flex;
  align-items:center;
  gap:8px;
  margin-bottom:16px;
  color:var(--rose);
  font-size:13px;
  font-weight:900;
}
.title {
  margin:0;
  color:transparent;
  background:var(--aura);
  -webkit-background-clip:text;
  background-clip:text;
  font-family:"Apple SD Gothic Neo","Noto Sans KR","Segoe UI",system-ui,sans-serif;
  font-variant-numeric:lining-nums proportional-nums;
  font-feature-settings:"lnum" 1,"pnum" 1;
  font-weight:950;
  font-size:clamp(46px,9vw,94px);
  line-height:1.02;
  letter-spacing:0;
  text-shadow:0 12px 34px rgba(183,110,121,.14);
}
.subtitle {
  margin:20px 0 0;
  color:var(--muted);
  line-height:1.75;
  font-size:17px;
}
.actions {
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:24px;
}
.primary-btn,
.ghost-btn {
  min-height:48px;
  border-radius:999px;
  border:0;
  padding:0 18px;
  font-weight:900;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  justify-content:center;
}
.primary-btn {
  color:#fff;
  background:linear-gradient(135deg,var(--coral),var(--rose));
  box-shadow:0 14px 32px rgba(183,110,121,.25);
}
.ghost-btn {
  color:var(--rose);
  background:rgba(255,255,255,.74);
  border:1px solid rgba(183,110,121,.18);
}
.hero-photo-wrap {
  position:relative;
  min-height:540px;
  display:grid;
  place-items:center;
  perspective:1400px;
}
.memory-stack {
  position:relative;
  width:min(620px,94vw);
  height:min(650px,118vw);
  display:grid;
  place-items:center;
  isolation:isolate;
}
.stack-card {
  position:absolute;
  width:35%;
  max-width:206px;
  aspect-ratio:4/5;
  padding:12px 12px 36px;
  border:1px solid rgba(213,187,171,.72);
  border-radius:10px 10px 8px 8px;
  background:#fffaf4;
  box-shadow:
    0 26px 54px rgba(69,43,36,.18),
    0 2px 0 rgba(255,255,255,.85) inset,
    0 -1px 0 rgba(147,102,88,.08) inset;
  transform:translate3d(var(--tx),var(--ty),var(--tz)) rotate(var(--rot));
  opacity:1;
  transition:
    transform .54s cubic-bezier(.22,1,.36,1),
    width .54s cubic-bezier(.22,1,.36,1),
    max-width .54s cubic-bezier(.22,1,.36,1),
    filter .32s ease,
    box-shadow .32s ease;
  cursor:pointer;
  outline:none;
  will-change:transform,filter;
  backface-visibility:hidden;
  contain:layout paint;
}
.stack-card:focus-visible {
  box-shadow:0 0 0 4px rgba(244,167,163,.28);
}
.stack-card:not(.center):hover,
.stack-card:not(.center).selected {
  transform:translate3d(var(--tx),calc(var(--ty) - 8px),var(--tz)) rotate(var(--rot)) scale(1.035);
  filter:saturate(1.06) brightness(1.02);
  box-shadow:
    0 30px 66px rgba(69,43,36,.24),
    0 2px 0 rgba(255,255,255,.9) inset,
    0 -1px 0 rgba(147,102,88,.08) inset;
}
.stack-card::after {
  content:attr(data-label);
  position:absolute;
  left:14px;
  right:14px;
  bottom:10px;
  display:block;
  margin-top:10px;
  color:#8b7066;
  font-family:ui-rounded,"SF Pro Rounded","Segoe UI",system-ui,sans-serif;
  font-weight:850;
  font-size:14px;
  text-align:center;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.stack-card.back-a { --tx:-236px; --ty:-126px; --tz:-120px; --rot:-13deg; z-index:1; }
.stack-card.back-b { --tx:236px; --ty:-124px; --tz:-112px; --rot:13deg; z-index:2; }
.stack-card.back-c { --tx:-232px; --ty:196px; --tz:-96px; --rot:10deg; z-index:3; }
.stack-card.back-d { --tx:232px; --ty:198px; --tz:-92px; --rot:-10deg; z-index:4; }
.stack-card.center {
  --tx:0;
  --ty:8px;
  --tz:80px;
  --rot:.4deg;
  z-index:5;
  width:62%;
  max-width:368px;
  transform:translate3d(var(--tx),var(--ty),var(--tz)) rotate(var(--rot));
  box-shadow:
    0 38px 84px rgba(69,43,36,.24),
    0 3px 0 rgba(255,255,255,.95) inset,
    0 -1px 0 rgba(147,102,88,.1) inset;
}
.stack-card.center::before {
  content:"뭉리니 순간";
  position:absolute;
  left:50%;
  top:-38px;
  transform:translateX(-50%);
  z-index:2;
  padding:7px 12px;
  border:1px solid rgba(255,255,255,.82);
  border-radius:999px;
  background:rgba(255,250,247,.88);
  color:#8a5b55;
  box-shadow:0 12px 28px rgba(126,78,63,.12);
  font-size:12px;
  font-weight:950;
  white-space:nowrap;
}
.stack-photo {
  position:relative;
  width:100%;
  aspect-ratio:4/5;
  border-radius:8px;
  overflow:hidden;
  background:#efe2d4 var(--photo) center/cover no-repeat;
  box-shadow:
    inset 0 0 0 1px rgba(75,45,38,.12),
    inset 0 1px 0 rgba(255,255,255,.36);
}
.stack-card.center .stack-photo {
  height:100%;
  border-radius:10px;
  animation:photoSwap .32s ease both;
}
.stack-photo::after,
.photo-surface::after,
.current-photo-surface::after {
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  opacity:.18;
  background-image:
    radial-gradient(circle,rgba(255,255,255,.75) 0 1px,transparent 1.2px),
    linear-gradient(90deg,rgba(61,44,46,.12),transparent 12%,rgba(255,255,255,.12) 50%,transparent 88%);
  background-size:18px 18px,100% 100%;
  mix-blend-mode:soft-light;
}
@keyframes photoSwap {
  from { opacity:.72; transform:scale(.985); }
  to { opacity:1; transform:scale(1); }
}
.tape {
  position:absolute;
  width:96px;
  height:32px;
  border-radius:6px;
  background:rgba(244,200,162,.7);
  box-shadow:0 8px 16px rgba(126,78,63,.1);
}
.tape.one { top:32px; left:28px; transform:rotate(-12deg); }
.tape.two { right:30px; bottom:62px; transform:rotate(13deg); }
.sticker {
  position:absolute;
  color:var(--rose);
  font-weight:900;
  text-shadow:0 8px 20px rgba(183,110,121,.18);
}
.sticker.heart-a { left:8%; bottom:16%; font-size:42px; transform:rotate(-12deg); }
.sticker.heart-b { right:10%; top:12%; font-size:26px; transform:rotate(15deg); }
.section-heading {
  display:flex;
  justify-content:space-between;
  align-items:end;
  gap:18px;
  margin-bottom:16px;
}
.section-heading h2 {
  margin:0;
  color:transparent;
  background:var(--aura);
  -webkit-background-clip:text;
  background-clip:text;
  font-size:clamp(28px,5vw,48px);
  line-height:1.05;
}
.section-heading p {
  margin:0;
  max-width:420px;
  color:var(--muted);
  font-size:17px;
  line-height:1.65;
}
.bento {
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:14px;
}
.bento-card,
.paper-card {
  border:1px solid var(--glass-border);
  border-radius:26px;
  background:var(--glass-bg);
  backdrop-filter:blur(20px) saturate(1.18);
  box-shadow:var(--glass-shadow);
}
.bento-card {
  min-height:172px;
  padding:22px;
}
.bento-card.large,
.bento-card.medium,
.bento-card.small { grid-column:auto; }
.bento-label {
  display:block;
  margin-bottom:12px;
  color:var(--rose);
  font-size:14px;
  font-weight:900;
}
.bento-value {
  margin:0;
  color:transparent;
  background:var(--aura);
  -webkit-background-clip:text;
  background-clip:text;
  font-size:clamp(28px,5vw,58px);
  line-height:1;
}
.bento-text {
  margin:0;
  color:var(--muted);
  font-size:17px;
  line-height:1.7;
}
.stamp {
  display:inline-flex;
  margin-top:18px;
  padding:7px 11px;
  border:1px solid rgba(183,110,121,.32);
  border-radius:999px;
  color:var(--rose);
  font-weight:900;
  font-size:13px;
}
.album-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
}
.polaroid {
  display:block;
  width:100%;
  border:1px solid var(--glass-border);
  text-align:left;
  padding:14px;
  border-radius:26px;
  background:var(--glass-bg);
  backdrop-filter:blur(20px) saturate(1.18);
  box-shadow:var(--glass-shadow);
  cursor:pointer;
  transition:transform .22s ease, box-shadow .22s ease, border-color .22s ease, background .22s ease;
}
.polaroid:focus-visible {
  outline:3px solid rgba(183,110,121,.38);
  outline-offset:4px;
}
.polaroid:hover {
  transform:translateY(-4px) scale(1.015) rotate(var(--tilt));
  border-color:rgba(255,255,255,.9);
  background:linear-gradient(145deg,rgba(255,255,255,.62),rgba(255,247,240,.3));
  box-shadow:0 24px 68px rgba(77,48,38,.18), inset 0 1px 0 rgba(255,255,255,.82);
}
.photo-surface {
  position:relative;
  overflow:hidden;
  aspect-ratio:4/3;
  border:1px solid rgba(255,255,255,.58);
  border-radius:18px;
  background:linear-gradient(145deg,rgba(255,250,247,.72),rgba(234,217,205,.58));
  box-shadow:inset 0 1px 0 rgba(255,255,255,.62);
}
.photo-surface img,
.photo-surface video {
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.polaroid-meta {
  padding:14px 4px 2px;
}
.polaroid-meta time {
  color:var(--rose);
  font-size:13px;
  font-weight:900;
}
.polaroid-meta h3 {
  margin:6px 0 5px;
  color:var(--deep);
  font-size:21px;
}
.polaroid-meta p {
  margin:0;
  color:var(--muted);
  line-height:1.55;
  font-size:15px;
}
.timeline {
  position:relative;
  display:grid;
  gap:16px;
  margin-left:10px;
  padding-left:24px;
}
.timeline::before {
  content:"";
  position:absolute;
  left:7px;
  top:8px;
  bottom:8px;
  width:2px;
  background:linear-gradient(var(--coral),var(--brown));
}
.timeline-item {
  position:relative;
  padding:18px;
  border-radius:22px;
  background:rgba(255,255,255,.7);
  border:1px solid rgba(255,255,255,.78);
  box-shadow:var(--soft);
}
.timeline-item::before {
  content:"♥";
  position:absolute;
  left:-30px;
  top:18px;
  width:26px;
  height:26px;
  display:grid;
  place-items:center;
  border-radius:50%;
  color:#fff;
  background:var(--coral);
  font-size:12px;
}
.timeline-item time {
  color:var(--rose);
  font-weight:900;
  font-size:14px;
}
.timeline-item h3 {
  margin:8px 0 5px;
  color:var(--deep);
}
.timeline-item p {
  margin:0;
  color:var(--muted);
  font-size:16px;
  line-height:1.6;
}
.letter-wrap {
  display:grid;
  grid-template-columns:.58fr 1.42fr;
  gap:0;
  align-items:stretch;
  overflow:hidden;
  border:1px solid var(--glass-border);
  border-radius:28px;
  background:var(--glass-bg);
  backdrop-filter:blur(20px) saturate(1.18);
  box-shadow:var(--glass-shadow);
}
#letter {
  width:min(1120px,100%);
}
.letter-photo {
  min-height:320px;
  border-radius:0;
  background:url("assets/letter-photo.jpg?v=54") center 44%/cover no-repeat;
  box-shadow:none;
}
.letter-card {
  position:relative;
  padding:34px;
  border-radius:0;
  background:
    linear-gradient(90deg,rgba(201,143,112,.12) 1px,transparent 1px) 0 0/28px 100%,
    rgba(255,255,255,.42);
  border:0;
  border-left:1px solid rgba(183,110,121,.12);
  box-shadow:none;
  transition:min-height .32s ease, padding .28s ease, box-shadow .28s ease;
}
.letter-card.expanded {
  padding-bottom:38px;
}
.letter-card:not(.expanded) {
  display:flex;
  flex-direction:column;
  justify-content:center;
  min-height:220px;
}
.hand-title {
  margin:0 0 20px;
  color:var(--rose);
  font-family:ui-rounded,"SF Pro Rounded","Segoe UI",system-ui,sans-serif;
  font-weight:950;
  font-size:clamp(28px,5vw,44px);
  line-height:1.15;
}
.letter-body {
  overflow:hidden;
  max-height:0;
  opacity:0;
  clip-path:inset(0 0 100% 0);
  transform:translateY(-8px);
  transition:max-height .5s cubic-bezier(.2,.78,.24,1), clip-path .46s cubic-bezier(.2,.78,.24,1), opacity .28s ease, transform .34s ease;
}
.letter-card.expanded .letter-body {
  max-height:1800px;
  overflow:hidden;
  opacity:1;
  clip-path:inset(0 0 0 0);
  transform:translateY(0);
}
.letter-body::after {
  content:"";
  position:absolute;
  left:0;
  right:0;
  bottom:82px;
  height:64px;
  pointer-events:none;
  opacity:1;
  transition:opacity .2s ease;
  background:linear-gradient(180deg,rgba(255,255,255,0),rgba(255,255,255,.86));
}
.letter-card:not(.expanded) .letter-body::after {
  display:none;
}
.letter-card.expanded .letter-body::after {
  opacity:0;
}
.letter-card p {
  margin:0 0 16px;
  color:var(--deep);
  line-height:1.9;
  font-size:17px;
}
.letter-toggle {
  position:relative;
  z-index:1;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  margin-top:8px;
  min-height:46px;
  padding:0 18px;
  border:1px solid rgba(183,110,121,.18);
  border-radius:999px;
  color:#fff;
  background:linear-gradient(135deg,var(--coral),var(--rose));
  box-shadow:0 14px 32px rgba(183,110,121,.22);
  font-weight:900;
}
.letter-toggle::after {
  content:"";
  width:8px;
  height:8px;
