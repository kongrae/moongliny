<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#FFF7F0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="우리의 1주년" />
<meta name="mobile-web-app-capable" content="yes" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png" />
<title>우리의 1주년</title>
<style>
:root {
  --cream:#fff7f0;
  --ivory:#f8f1e7;
  --paper:rgba(255,255,255,.6);
  --ink:#2f2422;
  --deep:#211916;
  --muted:#6f554d;
  --coral:#f4a7a3;
  --apricot:#f4c8a2;
  --rose:#b76e79;
  --brown:#c98f70;
  --aura:linear-gradient(120deg,#7b4e45 0%,#b76e79 34%,#d89a78 68%,#8f6f62 100%);
  --line:rgba(112,78,67,.16);
  --shadow:0 22px 60px rgba(126,78,63,.14);
  --soft:0 12px 32px rgba(126,78,63,.1);
}
* { box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  margin:0;
  color:#3a2a28;
  font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  font-size:17px;
  background:
    radial-gradient(circle at 12% 10%,rgba(244,167,163,.38),transparent 25%),
    radial-gradient(circle at 88% 8%,rgba(244,200,162,.38),transparent 27%),
    radial-gradient(circle at 80% 74%,rgba(183,110,121,.16),transparent 34%),
    linear-gradient(115deg,rgba(255,255,255,.24) 0 12%,transparent 12% 28%,rgba(255,255,255,.18) 28% 42%,transparent 42% 100%),
    linear-gradient(145deg,var(--cream),var(--ivory));
  background-attachment:fixed;
  min-height:100svh;
}
body.modal-locked {
  width:100%;
}
html.modal-locked-root,
html.modal-locked-root body {
  overscroll-behavior:none;
  background-color:var(--cream);
}
body::before {
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:.52;
  background-image:
    radial-gradient(circle at 1px 1px,rgba(61,44,46,.07) 0 1px,transparent 1.8px),
    repeating-linear-gradient(135deg,rgba(183,110,121,.045) 0 1px,transparent 1px 18px),
    repeating-linear-gradient(45deg,rgba(201,143,112,.035) 0 1px,transparent 1px 22px);
  background-size:26px 26px,180px 180px,220px 220px;
  mix-blend-mode:multiply;
}
body::after {
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  pointer-events:none;
  background:
    linear-gradient(120deg,rgba(255,255,255,.68),rgba(255,255,255,0) 34%,rgba(255,255,255,.4) 72%,rgba(255,255,255,0)),
    radial-gradient(ellipse at 22% 28%,rgba(255,255,255,.68),rgba(255,255,255,0) 28%),
    radial-gradient(ellipse at 72% 38%,rgba(255,255,255,.5),rgba(255,255,255,0) 26%),
    linear-gradient(180deg,rgba(255,247,240,.2),rgba(248,241,231,.08));
  filter:blur(.2px);
}
button,a { font:inherit; }
button { cursor:pointer; }
#root { position:relative; }
.app {
  position:relative;
  z-index:1;
  width:min(1180px,100%);
  margin:0 auto;
  padding:calc(12px + env(safe-area-inset-top)) 18px 18px;
}
.nav {
  position:sticky;
  top:calc(12px + env(safe-area-inset-top));
  z-index:5;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  width:min(980px,100%);
  margin:0 auto 8px;
  padding:10px 14px;
  border:1px solid rgba(255,255,255,.7);
  border-radius:999px;
  background:linear-gradient(135deg,rgba(255,255,255,.42),rgba(255,247,240,.18));
  backdrop-filter:blur(30px) saturate(1.45);
  box-shadow:0 18px 48px rgba(126,78,63,.13), inset 0 1px 0 rgba(255,255,255,.78);
}
.brand {
  display:flex;
  align-items:center;
  gap:8px;
  min-width:0;
  font-weight:900;
  color:var(--rose);
}
.brand-text {
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.brand-mark {
  flex:0 0 auto;
  width:26px;
  height:26px;
  border-radius:50%;
  display:grid;
  place-items:center;
  color:#fff;
  background:linear-gradient(135deg,var(--coral),var(--rose));
}
.nav-links {
  display:flex;
  gap:18px;
  font-size:14px;
  font-weight:900;
}
.nav-links a {
  color:var(--muted);
  text-decoration:none;
}
.section {
  width:min(980px,100%);
  margin:0 auto;
  padding:44px 0;
}
.intro {
  min-height:calc(100svh - 112px);
  display:grid;
  align-items:center;
  grid-template-columns:1fr;
  gap:14px;
  padding-top:20px;
}
.hero-card {
  position:relative;
  overflow:hidden;
  display:grid;
  grid-template-columns:1.02fr .98fr;
  gap:26px;
  align-items:center;
  padding:28px;
  border:1px solid rgba(255,255,255,.72);
  border-radius:34px;
  background:linear-gradient(145deg,rgba(255,255,255,.62),rgba(255,247,240,.32));
  backdrop-filter:blur(26px) saturate(1.22);
  box-shadow:0 28px 80px rgba(126,78,63,.16), inset 0 1px 0 rgba(255,255,255,.8);
}
.heart-rain {
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  overflow:hidden;
}
.heart-rain span {
  position:absolute;
  top:-40px;
  left:var(--x);
  color:rgba(183,110,121,.32);
  font-size:var(--s);
  animation:heartFall var(--d) linear infinite;
  animation-delay:var(--delay);
  filter:blur(.1px);
}
@keyframes heartFall {
  0% { transform:translate3d(0,-32px,0) rotate(0deg); opacity:0; }
  12% { opacity:.76; }
  100% { transform:translate3d(var(--drift),112vh,0) rotate(28deg); opacity:0; }
}
.hero-card::before {
  content:"";
  position:absolute;
  inset:16px;
  pointer-events:none;
  border:1px dashed rgba(183,110,121,.18);
  border-radius:26px;
}
.kicker {
  display:inline-flex;
  align-items:center;
  gap:8px;
  margin-bottom:16px;
  color:var(--rose);
  font-size:13px;
  font-weight:900;
}
.title {
  margin:0;
  color:transparent;
  background:var(--aura);
  -webkit-background-clip:text;
  background-clip:text;
  font-family:ui-rounded,"SF Pro Rounded","Segoe UI",system-ui,sans-serif;
  font-weight:950;
  font-size:clamp(46px,9vw,94px);
  line-height:1.02;
  letter-spacing:0;
  text-shadow:0 12px 34px rgba(183,110,121,.14);
}
.subtitle {
  margin:20px 0 0;
  color:var(--muted);
  line-height:1.75;
  font-size:17px;
}
.actions {
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:24px;
}
.primary-btn,
.ghost-btn {
  min-height:48px;
  border-radius:999px;
  border:0;
  padding:0 18px;
  font-weight:900;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  justify-content:center;
}
.primary-btn {
  color:#fff;
  background:linear-gradient(135deg,var(--coral),var(--rose));
  box-shadow:0 14px 32px rgba(183,110,121,.25);
}
.ghost-btn {
  color:var(--rose);
  background:rgba(255,255,255,.74);
  border:1px solid rgba(183,110,121,.18);
}
.hero-photo-wrap {
  position:relative;
  min-height:470px;
  display:grid;
  place-items:center;
  perspective:1200px;
}
.memory-stack {
  position:relative;
  width:min(560px,94vw);
  height:min(560px,112vw);
  display:grid;
  place-items:center;
}
.stack-card {
  position:absolute;
  width:38%;
  max-width:218px;
  aspect-ratio:4/5;
  padding:0;
  border:0;
  border-radius:18px;
  background:transparent;
  box-shadow:none;
  transform:translate3d(var(--tx),var(--ty),var(--tz)) rotate(var(--rot));
  opacity:1;
  transition:width .42s cubic-bezier(.16,1,.3,1), max-width .42s cubic-bezier(.16,1,.3,1), transform .46s cubic-bezier(.16,1,.3,1), opacity .24s ease, filter .28s ease;
  cursor:pointer;
  outline:none;
}
.stack-card:focus-visible {
  box-shadow:0 0 0 4px rgba(244,167,163,.28);
}
.stack-card.active {
  width:66%;
  max-width:340px;
  z-index:9 !important;
  transform:translate3d(0,-18px,120px) rotate(.6deg) scale(1.02);
  filter:saturate(1.04) brightness(1.03);
}
.stack-card::after {
  content:attr(data-label);
  display:none;
  margin-top:10px;
  color:#8b7066;
  font-family:ui-rounded,"SF Pro Rounded","Segoe UI",system-ui,sans-serif;
  font-weight:850;
  font-size:14px;
  white-space:nowrap;
}
.stack-card.back-a { --tx:-210px; --ty:-92px; --tz:-90px; --rot:-15deg; z-index:1; }
.stack-card.back-b { --tx:210px; --ty:-88px; --tz:-82px; --rot:14deg; z-index:2; }
.stack-card.back-c { --tx:-202px; --ty:154px; --tz:-64px; --rot:12deg; z-index:3; }
.stack-card.back-d { --tx:204px; --ty:156px; --tz:-58px; --rot:-13deg; z-index:4; }
.stack-card.blank { --tx:0; --ty:0; --tz:0; --rot:1.5deg; z-index:5; width:66%; max-width:340px; }
.stack-card.blank.active {
  transform:translate3d(0,-14px,120px) rotate(.4deg) scale(1.02);
}
.memory-stack.hide-empty-slot .stack-card.blank {
  opacity:0;
  pointer-events:none;
  transform:translate3d(0,8px,-40px) rotate(0) scale(.94);
}
.stack-photo {
  position:relative;
  width:100%;
  aspect-ratio:4/5;
  border-radius:18px;
  overflow:hidden;
  background:var(--photo) center/cover no-repeat;
  box-shadow:0 24px 58px rgba(69,43,36,.18), inset 0 1px 0 rgba(255,255,255,.42);
}
.stack-card.active .stack-photo {
  border-radius:22px;
  box-shadow:0 36px 90px rgba(69,43,36,.28), inset 0 1px 0 rgba(255,255,255,.42);
}
.stack-photo::after,
.photo-surface::after,
.modal-photo::after {
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  opacity:.18;
  background-image:
    radial-gradient(circle,rgba(255,255,255,.75) 0 1px,transparent 1.2px),
    linear-gradient(90deg,rgba(61,44,46,.12),transparent 12%,rgba(255,255,255,.12) 50%,transparent 88%);
  background-size:18px 18px,100% 100%;
  mix-blend-mode:soft-light;
}
.stack-placeholder {
  width:100%;
  aspect-ratio:4/5;
  border-radius:22px;
  display:grid;
  place-items:center;
  padding:18px;
  text-align:center;
  color:#8a5b55;
  background:
    linear-gradient(145deg,rgba(255,255,255,.62),rgba(255,247,240,.24)),
    repeating-linear-gradient(135deg,rgba(183,110,121,.08) 0 1px,transparent 1px 18px);
  border:2px dashed rgba(183,110,121,.32);
  cursor:pointer;
}
.stack-placeholder span {
  font-weight:950;
  line-height:1.55;
}
.stack-status {
  position:absolute;
  left:50%;
  bottom:10px;
  z-index:12;
  width:min(360px,86vw);
  transform:translateX(-50%);
  padding:12px 15px;
  border:1px solid rgba(255,255,255,.86);
  border-radius:18px;
  background:rgba(255,250,247,.94);
  backdrop-filter:blur(20px) saturate(1.25);
  box-shadow:0 18px 42px rgba(126,78,63,.2);
  color:#51322e;
  font-size:14px;
  font-weight:850;
  text-align:center;
  line-height:1.45;
  white-space:normal;
  word-break:keep-all;
}
.stack-upload-photo {
  width:100%;
  aspect-ratio:4/5;
  display:block;
  overflow:hidden;
  border-radius:22px;
  cursor:pointer;
}
.stack-upload-photo .stack-photo {
  height:100%;
}
.stack-photo-img {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.stack-upload-input {
  position:absolute;
  width:1px;
  height:1px;
  opacity:0;
  pointer-events:none;
}
.memory-stack:hover .stack-card.blank:not(.active) {
  transform:translate3d(0,-6px,0) rotate(1deg);
}
.tape {
  position:absolute;
  width:96px;
  height:32px;
  border-radius:6px;
  background:rgba(244,200,162,.7);
  box-shadow:0 8px 16px rgba(126,78,63,.1);
}
.tape.one { top:32px; left:28px; transform:rotate(-12deg); }
.tape.two { right:30px; bottom:62px; transform:rotate(13deg); }
.sticker {
  position:absolute;
  color:var(--rose);
  font-weight:900;
  text-shadow:0 8px 20px rgba(183,110,121,.18);
}
.sticker.heart-a { left:8%; bottom:16%; font-size:42px; transform:rotate(-12deg); }
.sticker.heart-b { right:10%; top:12%; font-size:26px; transform:rotate(15deg); }
.section-heading {
  display:flex;
  justify-content:space-between;
  align-items:end;
  gap:18px;
  margin-bottom:18px;
}
.section-heading h2 {
  margin:0;
  color:transparent;
  background:var(--aura);
  -webkit-background-clip:text;
  background-clip:text;
  font-size:clamp(28px,5vw,48px);
  line-height:1.05;
}
.section-heading p {
  margin:0;
  max-width:420px;
  color:var(--muted);
  font-size:17px;
  line-height:1.65;
}
.bento {
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:14px;
}
.bento-card,
.paper-card {
  border:1px solid rgba(255,255,255,.74);
  border-radius:26px;
  background:linear-gradient(145deg,rgba(255,255,255,.42),rgba(255,247,240,.18));
  backdrop-filter:blur(30px) saturate(1.45);
  box-shadow:0 18px 52px rgba(126,78,63,.12), inset 0 1px 0 rgba(255,255,255,.72);
}
.bento-card {
  min-height:172px;
  padding:22px;
}
.bento-card.large,
.bento-card.medium,
.bento-card.small { grid-column:auto; }
.bento-label {
  display:block;
  margin-bottom:12px;
  color:var(--rose);
  font-size:14px;
  font-weight:900;
}
.bento-value {
  margin:0;
  color:transparent;
  background:var(--aura);
  -webkit-background-clip:text;
  background-clip:text;
  font-size:clamp(28px,5vw,58px);
  line-height:1;
}
.bento-text {
  margin:0;
  color:var(--muted);
  font-size:17px;
  line-height:1.7;
}
.stamp {
  display:inline-flex;
  margin-top:18px;
  padding:7px 11px;
  border:1px solid rgba(183,110,121,.32);
  border-radius:999px;
  color:var(--rose);
  font-weight:900;
  font-size:13px;
}
.album-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
}
.polaroid {
  display:block;
  width:100%;
  border:1px solid rgba(255,255,255,.74);
  text-align:left;
  padding:14px;
  border-radius:26px;
  background:
    linear-gradient(145deg,rgba(255,255,255,.48),rgba(255,247,240,.22));
  backdrop-filter:blur(30px) saturate(1.45);
  box-shadow:0 18px 52px rgba(126,78,63,.12), inset 0 1px 0 rgba(255,255,255,.72);
  cursor:pointer;
  transition:transform .22s ease, box-shadow .22s ease, border-color .22s ease, background .22s ease;
}
.polaroid:focus-visible {
  outline:3px solid rgba(183,110,121,.38);
  outline-offset:4px;
}
.polaroid:hover {
  transform:translateY(-4px) scale(1.015) rotate(var(--tilt));
  border-color:rgba(255,255,255,.9);
  background:linear-gradient(145deg,rgba(255,255,255,.62),rgba(255,247,240,.3));
  box-shadow:0 24px 68px rgba(77,48,38,.18), inset 0 1px 0 rgba(255,255,255,.82);
}
.photo-surface {
  position:relative;
  overflow:hidden;
  aspect-ratio:4/3;
  border:1px solid rgba(255,255,255,.58);
  border-radius:18px;
  background:linear-gradient(145deg,rgba(255,250,247,.72),rgba(234,217,205,.58));
  box-shadow:inset 0 1px 0 rgba(255,255,255,.62);
}
.photo-surface img,
.photo-surface video {
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.polaroid-meta {
  padding:14px 4px 2px;
}
.polaroid-meta time {
  color:var(--rose);
  font-size:13px;
  font-weight:900;
}
.polaroid-meta h3 {
  margin:6px 0 5px;
  color:var(--deep);
  font-size:21px;
}
.polaroid-meta p {
  margin:0;
  color:var(--muted);
  line-height:1.55;
  font-size:15px;
}
.timeline {
  position:relative;
  display:grid;
  gap:16px;
  margin-left:10px;
  padding-left:24px;
}
.timeline::before {
  content:"";
  position:absolute;
  left:7px;
  top:8px;
  bottom:8px;
  width:2px;
  background:linear-gradient(var(--coral),var(--brown));
}
.timeline-item {
  position:relative;
  padding:18px;
  border-radius:22px;
  background:rgba(255,255,255,.7);
  border:1px solid rgba(255,255,255,.78);
  box-shadow:var(--soft);
}
.timeline-item::before {
  content:"♥";
  position:absolute;
  left:-30px;
  top:18px;
  width:26px;
  height:26px;
  display:grid;
  place-items:center;
  border-radius:50%;
  color:#fff;
  background:var(--coral);
  font-size:12px;
}
.timeline-item time {
  color:var(--rose);
  font-weight:900;
  font-size:14px;
}
.timeline-item h3 {
  margin:8px 0 5px;
  color:var(--deep);
}
.timeline-item p {
  margin:0;
  color:var(--muted);
  font-size:16px;
  line-height:1.6;
}
.letter-wrap {
  display:grid;
  grid-template-columns:.82fr 1.18fr;
  gap:18px;
  align-items:stretch;
}
.letter-photo {
  min-height:420px;
  border-radius:26px;
  background:url("assets/main-hero-cropped.jpg") center 45%/cover no-repeat;
  box-shadow:var(--soft);
}
.letter-card {
  padding:34px;
  border-radius:26px;
  background:
    linear-gradient(90deg,rgba(201,143,112,.12) 1px,transparent 1px) 0 0/28px 100%,
    rgba(255,255,255,.76);
  border:1px solid rgba(255,255,255,.78);
  box-shadow:var(--soft);
}
.hand-title {
  margin:0 0 20px;
  color:var(--rose);
  font-family:ui-rounded,"SF Pro Rounded","Segoe UI",system-ui,sans-serif;
  font-weight:950;
  font-size:clamp(28px,5vw,44px);
  line-height:1.15;
}
.letter-card p {
  margin:0 0 16px;
  color:var(--deep);
  line-height:1.9;
  font-size:17px;
}
.signature {
  margin-top:8px;
  color:var(--brown);
  font-weight:900;
  text-align:right;
}
.final-card {
  text-align:center;
  padding:44px 22px;
}
.modal {
  position:fixed;
  left:0;
  right:0;
  top:0;
  height:100lvh;
  z-index:20;
  display:none;
  place-items:center;
  padding:calc(22px + env(safe-area-inset-top)) 22px calc(22px + env(safe-area-inset-bottom));
  min-height:100vh;
  min-height:100dvh;
  min-height:100lvh;
  isolation:isolate;
  background:transparent;
  backdrop-filter:none;
  overflow:hidden;
}
.modal.open { display:grid; }
.modal.open .modal-shell {
  animation:modalIn .72s cubic-bezier(.16,1,.3,1) both;
}
.modal.closing .modal-shell {
  animation:modalOut .38s cubic-bezier(.7,0,.84,0) both;
}
.modal.open::before {
  animation:veilIn .58s ease both;
}
.modal.closing::before {
  animation:veilOut .34s ease both;
}
@keyframes modalIn {
  from { opacity:0; transform:translateY(8px) scale(.68); filter:blur(28px); }
  62% { opacity:1; transform:translateY(8px) scale(1.04); filter:blur(3px); }
  to { opacity:1; transform:translateY(8px) scale(1); filter:blur(0); }
}
@keyframes modalOut {
  from { opacity:1; transform:translateY(8px) scale(1); filter:blur(0); }
  to { opacity:0; transform:translateY(8px) scale(.72); filter:blur(24px); }
}
@keyframes veilIn {
  from { opacity:0; }
  to { opacity:1; }
}
@keyframes veilOut {
  from { opacity:1; }
  to { opacity:0; }
}
.modal::before {
  content:"";
  position:fixed;
  left:0;

  const handleAnniversaryPhoto = event => {
    const file = event.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const result = String(reader.result || "");
      setAnniversaryPhoto(result);
      try {
        window.localStorage.setItem("monglini-anniversary-photo", result);
      } catch (error) {}
    };
    reader.readAsDataURL(file);

    if (!window.mongliniStorage?.isConfigured) {
      setUploadStatus("Supabase 설정값을 넣으면 서버에 저장돼요. 지금은 이 기기에만 임시 저장됐어요.");
      clearStatus(6200);
      return;
    }

    setUploadStatus("Supabase에 업로드 준비 중...");
    window.mongliniStorage.uploadAnniversaryPhoto(file, progress => {
      setUploadStatus(`Supabase에 업로드 중 ${progress}%`);
    }).then(url => {
      setAnniversaryPhoto(url);
      try {
        window.localStorage.setItem("monglini-anniversary-photo", url);
      } catch (error) {}
      setUploadStatus("업로드 완료. 이제 다른 기기에서도 같은 사진이 보여요.");
      clearStatus(4600);
    }).catch(error => {
      const detail = error?.message || error?.error_description || error?.hint || "";
      const message = error?.message === "file-too-large"
        ? "사진 용량이 커서 업로드하지 못했어요. 12MB 이하 사진으로 다시 선택해줘요."
        : `Supabase 업로드 실패. anniversary 버킷, Public 설정, SQL policy를 확인해줘요.${detail ? ` (${detail.slice(0, 90)})` : ""}`;
      setUploadStatus(message);
      clearStatus(12000);
    });
  };

  const activateStackCard = key => {
    setActiveStackCard(current => current === key ? "blank" : key);
  };

  const handleStackKey = (event, key) => {
    if (event.key === "Enter" || event.key === " ") {
      event.preventDefault();
      activateStackCard(key);
    }
  };

  return (
    <section className="section intro" id="intro">
      <div className="hero-card fade-up">
        <div>
          <span className="kicker">♥ 뭉리니 스크랩북</span>

          <p className="subtitle">{CONFIG.heroSubtitle}<br />사진과 메모를 넘기듯, 지난 1년을 천천히 꺼내보는 작은 기록장.</p>
          <div className="actions">
            <button className="primary-btn" onClick={() => scrollToId("album")}>앨범 열기</button>
            <button className="ghost-btn" onClick={() => scrollToId("letter")}>편지 읽기</button>
          </div>
        </div>
        <div className="hero-photo-wrap" aria-label="대표 커플 사진">
          <span className="tape one"></span>
          <span className="tape two"></span>
          <span className="sticker heart-a">♥</span>
          <span className="sticker heart-b">♥</span>
          <div className={`memory-stack${activeStackCard !== "blank" && !anniversaryPhoto ? " hide-empty-slot" : ""}`} aria-label="기념일 사진 카드 스택">
            <article className={`stack-card back-a${activeStackCard === "summer" ? " active" : ""}`} data-label="summer" role="button" tabIndex="0" onClick={() => activateStackCard("summer")} onKeyDown={event => handleStackKey(event, "summer")}>
              <div className="stack-photo" style={{ "--photo":'url("assets/hero-stack/stack-1.jpg")' }}></div>
            </article>
            <article className={`stack-card back-b${activeStackCard === "autumn" ? " active" : ""}`} data-label="autumn" role="button" tabIndex="0" onClick={() => activateStackCard("autumn")} onKeyDown={event => handleStackKey(event, "autumn")}>
              <div className="stack-photo" style={{ "--photo":'url("assets/hero-stack/stack-2.jpg")' }}></div>
            </article>
            <article className={`stack-card back-c${activeStackCard === "winter" ? " active" : ""}`} data-label="winter" role="button" tabIndex="0" onClick={() => activateStackCard("winter")} onKeyDown={event => handleStackKey(event, "winter")}>
              <div className="stack-photo" style={{ "--photo":'url("assets/hero-stack/stack-3.jpg")' }}></div>
            </article>
            <article className={`stack-card back-d${activeStackCard === "spring" ? " active" : ""}`} data-label="spring" role="button" tabIndex="0" onClick={() => activateStackCard("spring")} onKeyDown={event => handleStackKey(event, "spring")}>
              <div className="stack-photo" style={{ "--photo":'url("assets/hero-stack/stack-4.jpg")' }}></div>
            </article>
            <article className={`stack-card blank${activeStackCard === "blank" ? " active" : ""}`} data-label="anniversary day" role="button" tabIndex="0" onClick={() => setActiveStackCard("blank")} onKeyDown={event => handleStackKey(event, "blank")}>
              {anniversaryPhoto ? (
                <label className="stack-upload-photo" onClick={() => setActiveStackCard("blank")}>
                  <span className="stack-photo">
                    <img className="stack-photo-img" src={anniversaryPhoto} alt="기념일 당일 사진" />
                  </span>
                  <input className="stack-upload-input" type="file" accept="image/*" onChange={handleAnniversaryPhoto} />
                </label>
              ) : (
                <label className="stack-placeholder" onClick={() => setActiveStackCard("blank")}>
                  <span>기념일 당일<br />사진을 채울 자리<br /><small>앨범에서 선택</small></span>
                  <input className="stack-upload-input" type="file" accept="image/*" onChange={handleAnniversaryPhoto} />
                </label>
              )}
            </article>
            {uploadStatus && <div className="stack-status">{uploadStatus}</div>}
          </div>
        </div>
      </div>
    </section>
  );
}

function MemoryModal({ memory, closing, onClose }) {
  const [activeIndex, setActiveIndex] = React.useState(0);
  const activeIndexRef = React.useRef(0);
  const touchStartX = React.useRef(null);
  const mediaCount = memory?.media?.length || 0;

  React.useEffect(() => {
    activeIndexRef.current = activeIndex;
  }, [activeIndex]);

  const goToSlide = React.useCallback(index => {
    if (!mediaCount) return;
    const nextIndex = Math.max(0, Math.min(index, mediaCount - 1));
    setActiveIndex(nextIndex);
    window.requestAnimationFrame(() => {
      document.querySelectorAll(".modal-memory").forEach((slide, slideIndex) => {
        const video = slide.querySelector("video");
        if (!video || !video.autoplay) return;
        video.controls = false;
        video.muted = true;
        if (slideIndex === nextIndex) {
          video.play?.().catch(() => {});
        } else {
          video.pause?.();
        }
      });
    });
  }, [mediaCount]);

  React.useEffect(() => {
    setActiveIndex(0);
  }, [memory?.id]);

  React.useEffect(() => {
    if (!memory) return;
    document.querySelectorAll(".modal-memory").forEach((slide, index) => {
      const video = slide.querySelector("video");
      if (!video) return;
      if (!video.autoplay) return;
      video.controls = false;
      video.muted = true;
      if (index === activeIndex) {
        video.play?.().catch(() => {});
      } else {
        video.pause?.();
      }
    });
  }, [memory, activeIndex]);

  React.useEffect(() => {
    if (!memory) return undefined;
    const previousBodyOverflow = document.body.style.overflow;
    const previousBodyOverscroll = document.body.style.overscrollBehavior;
    const previousHtmlOverflow = document.documentElement.style.overflow;
    const previousHtmlOverscroll = document.documentElement.style.overscrollBehavior;

    function handleKey(event) {
      if (event.key === "Escape") onClose();
      if (event.key === "ArrowLeft") goToSlide(activeIndexRef.current - 1);
      if (event.key === "ArrowRight") goToSlide(activeIndexRef.current + 1);
    }

    function lockBackgroundTouch(event) {
      event.preventDefault();
    }

    document.documentElement.classList.add("modal-locked-root");
    document.body.classList.add("modal-locked");
    document.documentElement.style.overflow = "hidden";
    document.body.style.overflow = "hidden";
    document.documentElement.style.overscrollBehavior = "none";
    document.body.style.overscrollBehavior = "none";
    window.addEventListener("keydown", handleKey);
    window.addEventListener("wheel", lockBackgroundTouch, { passive:false });
    window.addEventListener("touchmove", lockBackgroundTouch, { passive:false });
    document.querySelector(".modal")?.addEventListener("touchmove", lockBackgroundTouch, { passive:false });
    const playTimer = window.setTimeout(() => {
      document.querySelectorAll(".modal video").forEach(video => {
        if (!video.autoplay) return;
        video.muted = true;
        video.controls = false;
        video.playsInline = true;
        video.currentTime = 0;
        video.play?.().catch(() => {});
      });
    }, 120);
    return () => {
      window.clearTimeout(playTimer);
      document.querySelectorAll(".modal video").forEach(video => video.pause?.());
      document.querySelector(".modal")?.removeEventListener("touchmove", lockBackgroundTouch);
      window.removeEventListener("wheel", lockBackgroundTouch);
      window.removeEventListener("touchmove", lockBackgroundTouch);
      document.documentElement.classList.remove("modal-locked-root");
      document.body.classList.remove("modal-locked");
      document.documentElement.style.overflow = previousHtmlOverflow;
      document.body.style.overflow = previousBodyOverflow;
      document.documentElement.style.overscrollBehavior = previousHtmlOverscroll;
      document.body.style.overscrollBehavior = previousBodyOverscroll;
      window.removeEventListener("keydown", handleKey);
    };
  }, [memory, onClose, goToSlide]);

  if (!memory) return null;
  const handleTouchStart = event => {
    touchStartX.current = event.touches[0]?.clientX ?? null;
  };
  const handleTouchEnd = event => {
    if (touchStartX.current === null) return;
    const endX = event.changedTouches[0]?.clientX ?? touchStartX.current;
    const diff = touchStartX.current - endX;
    touchStartX.current = null;
    if (Math.abs(diff) < 42) return;
    goToSlide(activeIndex + (diff > 0 ? 1 : -1));
  };

  return (
    <div className={`modal open${closing ? " closing" : ""}`} onClick={event => event.target.classList.contains("modal") && onClose()} aria-hidden="false">
      <div className="modal-shell">
        <div className="modal-card">
          <div className="modal-head">
            <div>
              <h3>{memory.title}</h3>
            </div>
          </div>
          <div className="modal-grid" onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd} aria-label={`${memory.title} 사진 넘기기`}>
            <div className="modal-track" style={{ transform:`translate3d(calc(-${activeIndex * 100}% - ${activeIndex} * var(--slide-gap)),0,0)` }}>
              {memory.media.map((item, index) => (
                <figure className="modal-memory" key={`${item.src}-${index}`}>
                  <div className="modal-photo">
                    <Media item={item} />
                  </div>
                  <figcaption className="modal-caption">{item.caption || item.alt || memory.memo}</figcaption>
                </figure>
              ))}
            </div>
          </div>
          {mediaCount > 1 && (
            <>
              <button className="modal-nav prev" type="button" onClick={() => goToSlide(activeIndex - 1)} disabled={activeIndex === 0} aria-label="이전 사진">‹</button>
              <button className="modal-nav next" type="button" onClick={() => goToSlide(activeIndex + 1)} disabled={activeIndex === mediaCount - 1} aria-label="다음 사진">›</button>
              <div className="modal-pager" aria-hidden="true">
                {memory.media.map((item, index) => (
                  <span className={`modal-dot${index === activeIndex ? " active" : ""}`} key={`${item.src}-dot`} />
                ))}
              </div>
            </>
          )}
        </div>
        <button className="modal-close-floating" type="button" onClick={onClose} aria-label="앨범 닫기">닫기</button>
      </div>
    </div>
  );
}
